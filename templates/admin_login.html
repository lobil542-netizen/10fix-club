<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כניסה - 10FIX ניהול</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Heebo', Arial, sans-serif;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      direction: rtl;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .logo { font-size: 28px; font-weight: 900; margin-bottom: 6px; }
    .logo .fix { color: #888; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 28px; }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: #f5f5f7;
      border: 1.5px solid transparent;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      font-family: 'Heebo', Arial, sans-serif;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #000; background: #fff; }
    button {
      width: 100%;
      padding: 15px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Heebo', Arial, sans-serif;
    }
    .error {
      background: #fff0f0;
      color: #c00;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">10<span class="fix">FIX</span></div>
    <div class="subtitle">אזור ניהול</div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <input type="password" name="password" placeholder="סיסמה" autofocus>
      <button type="submit">כניסה</button>
    </form>
  </div>
</body>
</html>
